services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-planner}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: ${POSTGRES_USER:-planner}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-planner}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -c
      - for f in /migrations/*.up.sql; do psql -h postgres -v ON_ERROR_STOP=1 -f "$$f"; done

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      BOT_TOKEN_FILE: ${BOT_TOKEN_FILE:-}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_URL_FILE: ${DATABASE_URL_FILE:-}
      APP_ENV: docker
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      DIGEST_TIME: ${DIGEST_TIME:-09:30}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_ADDR: ${METRICS_ADDR:-:8080}
    ports:
      - "${METRICS_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
