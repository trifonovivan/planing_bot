name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
      - "Dockerfile"
      - "cmd/**"
      - "deploy/**"
      - "docker-compose.yml"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "migrations/**"
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
      - "Dockerfile"
      - "cmd/**"
      - "deploy/**"
      - "docker-compose.yml"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "migrations/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  docker-build:
    name: App Docker build
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: planner-bot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
