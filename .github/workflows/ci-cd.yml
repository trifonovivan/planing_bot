name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: planner-bot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs:
      - ci
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs:
      - publish
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/planner-bot' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      GHCR_USER: ${{ secrets.GHCR_USER || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'planner' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'planner' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DEFAULT_TIMEZONE: ${{ vars.DEFAULT_TIMEZONE || 'Europe/Moscow' }}
      DIGEST_TIME: ${{ vars.DIGEST_TIME || '09:30' }}
      METRICS_ENABLED: ${{ vars.METRICS_ENABLED || 'true' }}
      METRICS_BIND: ${{ vars.METRICS_BIND || '127.0.0.1:8080' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$GHCR_TOKEN"
          test -n "$BOT_TOKEN"
          test -n "$POSTGRES_PASSWORD"
          test -n "$DATABASE_URL"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote env
        run: |
          cat > .deploy.env <<EOF
          IMAGE=$IMAGE
          BOT_TOKEN=$BOT_TOKEN
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=$POSTGRES_DB
          DATABASE_URL=$DATABASE_URL
          APP_ENV=production
          DEFAULT_TIMEZONE=$DEFAULT_TIMEZONE
          DIGEST_TIME=$DIGEST_TIME
          METRICS_ENABLED=$METRICS_ENABLED
          METRICS_BIND=$METRICS_BIND
          EOF

      - name: Upload compose files
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/migrations'"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" deploy/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" .deploy.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" migrations/*.sql "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/migrations/"

      - name: Deploy
        run: |
          printf '%s\n' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose pull app && docker compose up -d --remove-orphans && docker image prune -f"
