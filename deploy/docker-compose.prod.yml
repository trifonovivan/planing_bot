x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    <<: *default-logging
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-planner}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    <<: *default-logging
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: ${POSTGRES_USER:-planner}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-planner}
    volumes:
      - ${MIGRATIONS_DIR:-./migrations}:/migrations:ro
    command:
      - sh
      - -c
      - |
        for f in /migrations/*.up.sql; do
          echo "applying $$f"
          psql -h postgres -v ON_ERROR_STOP=1 -f "$$f"
        done

  app:
    <<: *default-logging
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: Dockerfile
    image: ${IMAGE:-planner-bot:local}
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      BOT_TOKEN_FILE: ${BOT_TOKEN_FILE:-}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DATABASE_URL_FILE: ${DATABASE_URL_FILE:-}
      APP_ENV: ${APP_ENV:-production}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      DIGEST_TIME: ${DIGEST_TIME:-09:30}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_ADDR: ${METRICS_ADDR:-:8080}
    ports:
      - "${METRICS_BIND:-127.0.0.1:8080}:8080"
    restart: unless-stopped

  node-exporter:
    <<: *default-logging
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-latest}
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    restart: unless-stopped

  cadvisor:
    <<: *default-logging
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-latest}
    privileged: true
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped

  prometheus:
    <<: *default-logging
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.external-url=http://${PUBLIC_HOST:-176.120.21.95}/prometheus/
      - --web.route-prefix=/
    depends_on:
      app:
        condition: service_started
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    <<: *default-logging
    image: grafana/loki:${LOKI_VERSION:-latest}
    environment:
      LOKI_RETENTION: ${LOKI_RETENTION:-168h}
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    volumes:
      - ./deploy/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    <<: *default-logging
    image: grafana/promtail:${PROMTAIL_VERSION:-latest}
    command:
      - -config.file=/etc/promtail/promtail.yml
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./deploy/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    restart: unless-stopped

  grafana:
    <<: *default-logging
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_DOMAIN: ${PUBLIC_HOST:-176.120.21.95}
      GF_SERVER_ROOT_URL: http://${PUBLIC_HOST:-176.120.21.95}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  nginx:
    <<: *default-logging
    image: nginx:${NGINX_VERSION:-stable-alpine}
    depends_on:
      app:
        condition: service_started
      grafana:
        condition: service_started
      prometheus:
        condition: service_started
    ports:
      - "${HTTP_BIND:-0.0.0.0:80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  promtail-positions:
  grafana-data:
