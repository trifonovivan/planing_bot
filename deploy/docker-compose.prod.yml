services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-planner}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: ${POSTGRES_USER:-planner}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-planner}
    volumes:
      - ${MIGRATIONS_DIR:-./migrations}:/migrations:ro
    command:
      - sh
      - -c
      - psql -h postgres -v ON_ERROR_STOP=1 -f /migrations/001_init.up.sql

  app:
    image: ${IMAGE:?set IMAGE}
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      BOT_TOKEN_FILE: ${BOT_TOKEN_FILE:-}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DATABASE_URL_FILE: ${DATABASE_URL_FILE:-}
      APP_ENV: ${APP_ENV:-production}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      DIGEST_TIME: ${DIGEST_TIME:-09:30}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_ADDR: ${METRICS_ADDR:-:8080}
    ports:
      - "${METRICS_BIND:-127.0.0.1:8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
